<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMTH Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div x-data="app()" x-init="init()" class="container mx-auto px-4 py-8">
        <!-- 头部 -->
        <header class="mb-8">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800" x-text="t('app.title')"></h1>
                    <p class="text-gray-600" x-text="t('app.subtitle')"></p>
                </div>
                <!-- 语言选择器 -->
                <div class="flex items-center gap-2">
                    <select x-model="currentLang"
                            @change="setLanguage($event.target.value)"
                            class="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded text-sm cursor-pointer hover:border-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="zh-CN">简体中文</option>
                        <option value="zh-TW">繁體中文</option>
                        <option value="en-US">English</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- 操作按钮 -->
        <div class="mb-6">
            <div class="flex flex-wrap gap-4">
                <button @click="refreshAll()"
                        :disabled="loading"
                        class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 disabled:opacity-50 transition"
                        x-text="loading ? t('status.loading') : t('btn.refresh')">
                </button>
                <button @click="triggerScrape()"
                        :disabled="scraping"
                        class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 disabled:opacity-50 transition"
                        x-text="scraping ? t('status.scraping') : t('btn.scrape')">
                </button>
                <button @click="triggerETL()"
                        :disabled="etlProcessing"
                        class="px-4 py-2 bg-orange-500 text-white rounded hover:bg-orange-600 disabled:opacity-50 transition"
                        x-text="etlProcessing ? t('status.processing') : t('btn.etl')">
                </button>
            </div>
            <p class="mt-2 text-sm text-gray-500">
                <span class="text-amber-600">⚠️</span> <span x-text="t('warn.scrape')"></span>
            </p>
        </div>

        <!-- Tab 切换 -->
        <div class="mb-6 border-b border-gray-200">
            <nav class="flex space-x-8">
                <button @click="switchTab('mmth')"
                        :class="activeTab === 'mmth' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                        class="py-4 px-1 border-b-2 font-medium text-sm"
                        x-text="t('tab.mmth')">
                </button>
                <button @click="switchTab('logs')"
                        :class="activeTab === 'logs' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                        class="py-4 px-1 border-b-2 font-medium text-sm"
                        x-text="t('tab.logs')">
                </button>
                <button @click="switchTab('cave')"
                        :class="activeTab === 'cave' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                        class="py-4 px-1 border-b-2 font-medium text-sm"
                        x-text="t('tab.cave')">
                </button>
                <button @click="switchTab('challenge')"
                        :class="activeTab === 'challenge' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                        class="py-4 px-1 border-b-2 font-medium text-sm"
                        x-text="t('tab.challenge')">
                </button>
                <button @click="switchTab('items')"
                        :class="activeTab === 'items' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                        class="py-4 px-1 border-b-2 font-medium text-sm"
                        x-text="t('tab.items')">
                </button>
            </nav>
        </div>

        <!-- MMTH 钻石监控 Tab -->
        <div x-show="activeTab === 'mmth'" x-cloak>
            <p class="text-sm text-gray-500 mb-4" x-show="lastScrapeTime" x-text="t('mmth.lastScrapeTime', {time: lastScrapeTime})"></p>

            <!-- 最新抓取数据 -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="text-xl font-semibold mb-4" x-text="t('mmth.latestData')"></h2>
                <div x-show="latestData.length === 0" class="text-gray-500" x-text="t('status.noData')"></div>
                <div x-show="latestData.length > 0" class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b bg-gray-50">
                                <th class="text-left py-3 px-4" x-text="t('col.server')"></th>
                                <th class="text-left py-3 px-4" x-text="t('col.account')"></th>
                                <th class="text-right py-3 px-4" x-text="t('col.totalDiamond')"></th>
                                <th class="text-right py-3 px-4" x-text="t('col.freeDiamond')"></th>
                                <th class="text-right py-3 px-4" x-text="t('col.paidDiamond')"></th>
                                <th class="text-left py-3 px-4" x-text="t('col.status')"></th>
                                <th class="text-left py-3 px-4" x-text="t('col.time')"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="item in latestData" :key="item.account">
                                <tr class="border-b hover:bg-gray-50">
                                    <td class="py-3 px-4" x-text="item.server"></td>
                                    <td class="py-3 px-4 font-medium" x-text="item.account"></td>
                                    <td class="py-3 px-4 text-right font-mono" x-text="item.total.toLocaleString()"></td>
                                    <td class="py-3 px-4 text-right font-mono text-blue-600" x-text="item.free.toLocaleString()"></td>
                                    <td class="py-3 px-4 text-right font-mono text-purple-600" x-text="item.paid.toLocaleString()"></td>
                                    <td class="py-3 px-4">
                                        <span x-show="!item.error" class="text-green-600" x-text="t('status.normal')"></span>
                                        <span x-show="item.error" class="text-red-600" x-text="item.error"></span>
                                    </td>
                                    <td class="py-3 px-4 text-sm text-gray-500" x-text="item.timestamp"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 历史趋势图 -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="text-xl font-semibold mb-4" x-text="t('mmth.historyTrend')"></h2>
                <div class="mb-4 flex flex-wrap gap-4 items-end">
                    <div>
                        <label class="block text-gray-700 mb-1 text-sm" x-text="t('mmth.selectAccount')"></label>
                        <select x-model="selectedAccount"
                                class="border rounded px-3 py-2 w-48"
                                @change="updateMmthCharts()">
                            <option value="" x-text="t('mmth.allAccounts')"></option>
                            <template x-for="name in mmthAccountNames" :key="name">
                                <option :value="name" x-text="name"></option>
                            </template>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-1 text-sm" x-text="t('mmth.dataType')"></label>
                        <select x-model="dataType"
                                class="border rounded px-3 py-2 w-32"
                                @change="updateMmthCharts()">
                            <option value="total" x-text="t('mmth.total')"></option>
                            <option value="free" x-text="t('mmth.free')"></option>
                            <option value="paid" x-text="t('mmth.paid')"></option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-1 text-sm" x-text="t('mmth.timeGroup')"></label>
                        <select x-model="mmthTimeGroup"
                                class="border rounded px-3 py-2 w-32"
                                @change="updateMmthCharts()">
                            <option value="raw" x-text="t('mmth.raw')"></option>
                            <option value="day" x-text="t('mmth.day')"></option>
                            <option value="week" x-text="t('mmth.week')"></option>
                            <option value="month" x-text="t('mmth.month')"></option>
                        </select>
                    </div>
                </div>
                <div id="historyChart" style="width: 100%; height: 400px;"></div>
            </div>

            <!-- 汇总统计卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <template x-for="item in latestData.filter(i => !i.error)" :key="item.account">
                    <div class="bg-white rounded-lg shadow p-4">
                        <div class="text-sm text-gray-600" x-text="item.account"></div>
                        <div class="text-2xl font-bold text-blue-600" x-text="item.total.toLocaleString()"></div>
                        <div class="text-xs text-gray-400 mt-1">
                            <span x-text="t('logs.free')"></span>: <span x-text="item.free.toLocaleString()"></span> |
                            <span x-text="t('logs.paid')"></span>: <span x-text="item.paid.toLocaleString()"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- 钻石日志统计 Tab -->
        <div x-show="activeTab === 'logs'" x-cloak>
            <!-- 角色选择 -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div class="mb-4 flex flex-wrap gap-4 items-end">
                    <div>
                        <label class="block text-gray-700 mb-2" x-text="t('logs.selectCharacter')"></label>
                        <select x-model="selectedCharacter"
                                class="border rounded px-3 py-2 w-full md:w-64"
                                @change="updateLogsCharts()">
                            <option value="" x-text="t('logs.all')"></option>
                            <template x-for="name in characterNames" :key="name">
                                <option :value="name" x-text="name"></option>
                            </template>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2" x-text="t('mmth.timeGroup')"></label>
                        <select x-model="logsTimeGroup"
                                class="border rounded px-3 py-2 w-32"
                                @change="updateLogsCharts()">
                            <option value="day" x-text="t('mmth.day')"></option>
                            <option value="week" x-text="t('mmth.week')"></option>
                            <option value="month" x-text="t('mmth.month')"></option>
                        </select>
                    </div>
                </div>

                <!-- 汇总卡片 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-blue-50 rounded p-4">
                        <div class="text-sm text-blue-600" x-text="t('logs.totalGain')"></div>
                        <div class="text-2xl font-bold text-blue-800" x-text="totalGain.toLocaleString()"></div>
                    </div>
                    <div class="bg-red-50 rounded p-4">
                        <div class="text-sm text-red-600" x-text="t('logs.totalConsume')"></div>
                        <div class="text-2xl font-bold text-red-800" x-text="totalConsume.toLocaleString()"></div>
                    </div>
                    <div class="bg-green-50 rounded p-4">
                        <div class="text-sm text-green-600" x-text="t('logs.netChange')"></div>
                        <div class="text-2xl font-bold text-green-800" x-text="totalNetChange.toLocaleString()"></div>
                    </div>
                </div>
            </div>

            <!-- 图表 -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div id="dailyChart" style="width: 100%; height: 400px;" class="mb-6"></div>
                <div id="sourceChart" style="width: 100%; height: 300px;"></div>
            </div>
        </div>

        <!-- 洞窟日志统计 Tab -->
        <div x-show="activeTab === 'cave'" x-cloak>
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold" x-text="t('cave.title')"></h2>
                    <div class="flex items-center gap-2">
                        <label class="text-sm text-gray-600" x-text="t('cave.displayDays')"></label>
                        <select x-model.number="caveDays" class="border rounded px-2 py-1 text-sm w-20">
                            <option value="5" x-text="t('cave.days', {n: 5})"></option>
                            <option value="7" x-text="t('cave.days', {n: 7})"></option>
                            <option value="14" x-text="t('cave.days', {n: 14})"></option>
                            <option value="30" x-text="t('cave.days', {n: 30})"></option>
                            <option value="0" x-text="t('cave.all')"></option>
                        </select>
                    </div>
                </div>
                <div x-show="caveCharacters.length === 0" class="text-gray-500" x-text="t('status.noData')"></div>
                <div x-show="caveCharacters.length > 0" class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b bg-gray-50">
                                <th class="text-left py-2 px-3 font-medium" x-text="t('col.character')"></th>
                                <template x-for="date in caveRecentDates" :key="date">
                                    <th class="text-center py-2 px-2 font-medium whitespace-nowrap" x-text="date.substring(5)"></th>
                                </template>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="char in caveCharacters" :key="char">
                                <tr class="border-b hover:bg-gray-50">
                                    <td class="py-2 px-3 font-medium whitespace-nowrap" x-text="char"></td>
                                    <template x-for="date in caveRecentDates" :key="date">
                                        <td class="py-2 px-1 text-center whitespace-nowrap">
                                            <span class="px-2 py-1 rounded text-xs whitespace-nowrap"
                                                  :class="getCaveStatusClass(char, date)"
                                                  x-text="getCaveStatusText(char, date)">
                                            </span>
                                        </td>
                                    </template>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 战斗日志统计 Tab -->
        <div x-show="activeTab === 'challenge'" x-cloak>
            <!-- 角色选择 -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div class="flex flex-wrap gap-4 items-end">
                    <div>
                        <label class="block text-gray-700 mb-2" x-text="t('challenge.selectCharacter')"></label>
                        <select x-model="challengeSelectedCharacter"
                                class="border rounded px-3 py-2 w-full md:w-64">
                            <option value="" x-text="t('challenge.all')"></option>
                            <template x-for="name in challengeCharacterNames" :key="name">
                                <option :value="name" x-text="name"></option>
                            </template>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2" x-text="t('challenge.levelType')"></label>
                        <select x-model="challengeSelectedType"
                                class="border rounded px-3 py-2 w-40">
                            <template x-for="opt in challengeTypeOptions" :key="opt.value">
                                <option :value="opt.value" x-text="opt.label"></option>
                            </template>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 主线关卡统计 -->
            <div x-show="challengeQuestStats.length > 0"
                 class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="text-xl font-semibold mb-4" x-text="t('challenge.quest')"></h2>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b bg-gray-50">
                                <th class="text-left py-3 px-4" x-text="t('col.level')"></th>
                                <th x-show="!challengeSelectedCharacter" class="text-left py-3 px-4" x-text="t('col.character')"></th>
                                <th class="text-right py-3 px-4" x-text="t('col.attempts')"></th>
                                <th class="text-left py-3 px-4" x-text="t('col.status')"></th>
                                <th class="text-left py-3 px-4" x-text="t('col.lastChallenge')"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="item in challengeQuestStats" :key="item.level + (item.character || '')">
                                <tr class="border-b hover:bg-gray-50">
                                    <td class="py-3 px-4 font-medium" x-text="item.level"></td>
                                    <td x-show="!challengeSelectedCharacter" class="py-3 px-4 text-gray-600" x-text="item.character"></td>
                                    <td class="py-3 px-4 text-right" x-text="item.attempts"></td>
                                    <td class="py-3 px-4">
                                        <span :class="item.success ? 'text-green-600' : 'text-red-600'"
                                              x-text="item.success ? t('status.cleared') : t('status.notCleared')"></span>
                                    </td>
                                    <td class="py-3 px-4 text-sm text-gray-500" x-text="item.last_time || '-'"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 塔统计（按类型分组） -->
            <template x-for="tower in challengeTowerTypes" :key="tower">
                <div x-show="getChallengeTowerStats(tower).length > 0"
                     class="bg-white rounded-lg shadow p-6 mb-6">
                    <h2 class="text-xl font-semibold mb-4" x-text="t('challenge.tower', {name: tower})"></h2>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="border-b bg-gray-50">
                                    <th class="text-left py-3 px-4" x-text="t('col.floor')"></th>
                                    <th x-show="!challengeSelectedCharacter" class="text-left py-3 px-4" x-text="t('col.character')"></th>
                                    <th class="text-right py-3 px-4" x-text="t('col.attempts')"></th>
                                    <th class="text-left py-3 px-4" x-text="t('col.status')"></th>
                                    <th class="text-left py-3 px-4" x-text="t('col.lastChallenge')"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="item in getChallengeTowerStats(tower)" :key="item.level + (item.character || '')">
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="py-3 px-4 font-medium" x-text="item.level"></td>
                                        <td x-show="!challengeSelectedCharacter" class="py-3 px-4 text-gray-600" x-text="item.character"></td>
                                        <td class="py-3 px-4 text-right" x-text="item.attempts"></td>
                                        <td class="py-3 px-4">
                                            <span :class="item.success ? 'text-green-600' : 'text-red-600'"
                                                  x-text="item.success ? t('status.cleared') : t('status.notCleared')"></span>
                                        </td>
                                        <td class="py-3 px-4 text-sm text-gray-500" x-text="item.last_time || '-'"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </div>

        <!-- 物品日志统计 Tab -->
        <div x-show="activeTab === 'items'" x-cloak>
            <!-- 筛选条件 -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div class="mb-4 flex flex-wrap gap-4 items-end">
                    <div>
                        <label class="block text-gray-700 mb-2" x-text="t('items.itemType')"></label>
                        <select x-model="itemType"
                                class="border rounded px-3 py-2 w-48"
                                @change="updateItemCharts()">
                            <option value="runeTicket" x-text="t('items.runeTicket')"></option>
                            <option value="upgradePanacea" x-text="t('items.upgradePanacea')"></option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2" x-text="t('items.selectCharacter')"></label>
                        <select x-model="itemSelectedCharacter"
                                class="border rounded px-3 py-2 w-full md:w-64"
                                @change="updateItemCharts()">
                            <option value="" x-text="t('items.all')"></option>
                            <template x-for="name in itemCharacterNames" :key="name">
                                <option :value="name" x-text="name"></option>
                            </template>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2" x-text="t('items.timeGroup')"></label>
                        <select x-model="itemTimeGroup"
                                class="border rounded px-3 py-2 w-32"
                                @change="updateItemCharts()">
                            <option value="day" x-text="t('mmth.day')"></option>
                            <option value="week" x-text="t('mmth.week')"></option>
                            <option value="month" x-text="t('mmth.month')"></option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="text-xl font-semibold mb-4" x-text="itemTypeName"></h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-blue-50 rounded p-4">
                        <div class="text-sm text-blue-600" x-text="t('logs.totalGain')"></div>
                        <div class="text-2xl font-bold text-blue-800" x-text="(itemType === 'upgradePanacea' ? upgradePanaceaTotalGain : itemTotalGain).toLocaleString()"></div>
                    </div>
                    <div class="bg-red-50 rounded p-4">
                        <div class="text-sm text-red-600" x-text="t('logs.totalConsume')"></div>
                        <div class="text-2xl font-bold text-red-800" x-text="(itemType === 'upgradePanacea' ? upgradePanaceaTotalConsume : itemTotalConsume).toLocaleString()"></div>
                    </div>
                    <div class="bg-green-50 rounded p-4">
                        <div class="text-sm text-green-600" x-text="t('logs.netChange')"></div>
                        <div class="text-2xl font-bold text-green-800" x-text="(itemType === 'upgradePanacea' ? upgradePanaceaTotalNetChange : itemTotalNetChange).toLocaleString()"></div>
                    </div>
                </div>
                <div id="itemDailyChart" style="width: 100%; height: 350px;" class="mb-4"></div>
                <div id="itemSourceChart" style="width: 100%; height: 280px;"></div>
            </div>
        </div>
    </div>

    <!-- 模块加载顺序: i18n -> 工具 -> API -> 图表 -> Tab模块 -> 主入口 -->
    <script src="js/i18n/translations.js?v=30"></script>
    <script src="js/i18n/glossary.js?v=30"></script>
    <script src="js/i18n/i18n.js?v=30"></script>
    <script src="js/utils.js?v=30"></script>
    <script src="js/api.js?v=30"></script>
    <script src="js/charts.js?v=30"></script>
    <script src="js/tabs/mmth.js?v=30"></script>
    <script src="js/tabs/logs.js?v=30"></script>
    <script src="js/tabs/cave.js?v=30"></script>
    <script src="js/tabs/challenge.js?v=30"></script>
    <script src="js/tabs/items.js?v=30"></script>
    <script src="js/app.js?v=30"></script>
</body>
</html>
