# MementoMori WebUI 独立部署
# 日志持久化供 ETL 处理

version: '3.8'

services:
  mementomori-webui:
    image: moonheartmoon/mementomori-webui:latest
    container_name: mementomori-webui
    restart: unless-stopped
    ports:
      - "5290:8080"
    environment:
      - TZ=Asia/Shanghai
      - LANG=zh_CN.UTF-8
    volumes:
      - ./Master:/app/Master/
      - ./appsettings.user.json:/app/appsettings.user.json:rw
      - ./mmth-logs:/app/Logs
    # 日志持久化：重定向 stdout/stderr 到文件
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /app/Logs && dotnet MementoMori.WebUI.dll 2>&1 | tee /app/Logs/app.log"]
    # Docker 日志轮转（tee 会产生双重日志，限制 Docker 日志大小）
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 256M
